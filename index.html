<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glass UI Messenger Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* ================= ДИЗАЙН (СТЕКЛЯННЫЙ СТИЛЬ) ================= */
        :root {
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 100%);
            --glass-border: rgba(255, 255, 255, 0.3);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a; /* Темный фон для контраста стекла */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 100px;
            border-radius: 10px;
            border: 2px solid var(--accent-color);
            z-index: 10;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-end { background: rgba(255, 68, 68, 0.4); }

        #callModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button onclick="startCall()">Начать звонок</button>
        <button class="btn-end" onclick="endCall()">Завершить</button>
    </div>

    <div id="callStatusText" style="margin-top: 10px; opacity: 0.7;">Готов к вызову</div>

    <div id="callModal">
        <div class="modal-content">
            <h2 id="modalStatus">Инициализация...</h2>
            <button onclick="endCall()">Отмена</button>
        </div>
    </div>

    <script>
        // ================= 1. КОНФИГУРАЦИЯ FIREBASE =================
        // Замените данные ниже на те, что указаны в вашем проекте Firebase!
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_PROJECT_ID.firebaseapp.com",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_PROJECT_ID.appspot.com",
            messagingSenderId: "ВАШ_ID",
            appId: "ВАШ_APP_ID"
        };

        // ================= 2. ИНИЦИАЛИЗАЦИЯ =================
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // Объявляем базу данных и переменные звонка глобально
        const db = firebase.firestore();
        let localStream = null;
        let remoteStream = null;
        let peerConnection = null;
        let currentCallDocId = null;

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        // ================= 3. ЛОГИКА ЗВОНКА =================

        async function startCall() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            remoteStream = new MediaStream();

            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('remoteVideo').srcObject = remoteStream;

            peerConnection = new RTCPeerConnection(servers);

            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            peerConnection.ontrack = event => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
            };

            // Создаем документ в Firestore
            const callDoc = db.collection('calls').doc();
            const offerCandidates = callDoc.collection('offerCandidates');
            const answerCandidates = callDoc.collection('answerCandidates');

            currentCallDocId = callDoc.id;

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    offerCandidates.add(event.candidate.toJSON());
                }
            };

            const offerDescription = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offerDescription);

            const offer = {
                sdp: offerDescription.sdp,
                type: offerDescription.type,
            };

            await callDoc.set({ offer });

            // Слушаем ответы
            callDoc.onSnapshot(snapshot => {
                const data = snapshot.data();
                if (!peerConnection.currentRemoteDescription && data?.answer) {
                    const answerDescription = new RTCSessionDescription(data.answer);
                    peerConnection.setRemoteDescription(answerDescription);
                }
            });

            answerCandidates.onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const candidate = new RTCIceCandidate(change.doc.data());
                        peerConnection.addIceCandidate(candidate);
                    }
                });
            });

            document.getElementById('callStatusText').innerText = 'Ожидание ответа... ID: ' + currentCallDocId;
        }

        async function answerCall(callId) {
            const callDoc = db.collection('calls').doc(callId);
            const answerCandidates = callDoc.collection('answerCandidates');
            const offerCandidates = callDoc.collection('offerCandidates');

            peerConnection = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if(event.candidate) answerCandidates.add(event.candidate.toJSON());
            };

            const callData = (await callDoc.get()).data();
            const offerDescription = callData.offer;
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDescription));

            const answerDescription = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answerDescription);

            await callDoc.update({ answer: { type: answerDescription.type, sdp: answerDescription.sdp } });

            offerCandidates.onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });

            document.getElementById('callStatusText').innerText = 'Соединено';
        }

        function endCall() {
            document.getElementById('callModal').style.display = 'none';
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            
            if (currentCallDocId) {
                db.collection('calls').doc(currentCallDocId).delete().catch(()=>{});
            }
            
            currentCallDocId = null;
            peerConnection = null;
            localStream = null;
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('callStatusText').innerText = 'Звонок завершен';
        }
    </script>
</body>
</html>
